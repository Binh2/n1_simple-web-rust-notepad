name: Deploy Static Leptos Site

on:
  push:
    branches: ["main"] # Triggers whenever code is pushed to your primary branch
  workflow_dispatch:

# Set required permissions for automated GitHub Pages hosting
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set Up Rust Build Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk Compiler
        run: wget -qO- https://github.com | tar -xzf- -C /usr/local/bin

      - name: Build Production Release Assets
        # Compiles the final standalone HTML, CSS, and WASM into the "/dist" directory
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/"

      - name: Configure GitHub Pages Asset Routing
        uses: actions/configure-pages@v5

      - name: Pack Production Directory Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages Live Servers 🚀
        id: deployment
        uses: actions/deploy-pages@v4